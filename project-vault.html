<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Project Vault – UP Formazione</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:#1a2744; --navy2:#243459; --navy3:#2e4070;
  --amber:#e8a020; --amber2:#fdf3e0;
  --green:#1a7a3a; --green2:#edf7f1;
  --red:#b52a2a; --red2:#fdf0f0;
  --orange:#c75a00; --orange2:#fff4ec;
  --blue:#2255c4; --blue2:#eef3fd;
  --bg:#f2f4f8; --surface:#fff;
  --border:#dde2ec; --border2:#c8cfe0;
  --text:#1a2133; --mid:#4a5570; --muted:#7a85a0;
  --r8:8px; --r12:12px; --r16:16px;
  --sh1:0 1px 3px rgba(26,39,68,.07);
  --sh2:0 4px 12px rgba(26,39,68,.10);
  --sh3:0 12px 32px rgba(26,39,68,.16);
  font-family:'DM Sans',sans-serif; font-size:15px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.bar{display:flex;justify-content:space-between;align-items:center;
  padding:0 20px;height:60px;background:var(--navy);
  position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.bar h1{font-size:17px;font-weight:700;color:#fff;letter-spacing:.3px;}
.bar h1 span{color:var(--amber);}
.bar-sub{font-size:11.5px;margin-top:1px;}
.bar-sub.ok{color:#5edb8a;} .bar-sub.err{color:#ff8080;font-weight:600;}
.bar-sub.sync{color:#ffc966;} .bar-sub.info{color:rgba(255,255,255,.45);}
.bar-right{display:flex;gap:6px;align-items:center;}

/* BUTTONS */
button,a.btn{cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;
  border-radius:var(--r8);border:1px solid transparent;padding:7px 13px;
  transition:background .15s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;}
button:disabled{opacity:.4;cursor:not-allowed;}
.btn-amber{background:var(--amber);color:var(--navy);border-color:var(--amber);font-weight:700;}
.btn-amber:hover{background:#d48f18;}
.btn-navy{background:var(--navy);color:#fff;border-color:var(--navy);}
.btn-navy:hover{background:var(--navy3);}
.btn-ghost{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.2);}
.btn-ghost:hover{background:rgba(255,255,255,.2);color:#fff;}
.btn-sec{background:var(--bg);color:var(--mid);border-color:var(--border);}
.btn-sec:hover{background:var(--border);color:var(--text);}
.btn-danger{background:var(--red2);color:var(--red);border-color:#f0b0b0;}
.btn-danger:hover{background:#fbe0e0;}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.btn-icon{padding:4px 7px;font-size:14px;background:transparent;border:none;color:var(--muted);}
.btn-icon:hover{color:var(--text);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 60px);}
.sidebar{border-right:1px solid var(--border);padding:14px;background:var(--surface);display:flex;flex-direction:column;gap:10px;}
.main{padding:14px;overflow:auto;}

/* SIDEBAR */
.sidebar-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:4px;}
.search-box{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r8);
  font-family:inherit;font-size:13px;background:var(--bg);color:var(--text);}
.search-box:focus{outline:none;border-color:var(--blue);}
.filter-row{display:flex;gap:4px;flex-wrap:wrap;}
.f-btn{padding:3px 9px;font-size:11.5px;font-weight:500;border-radius:20px;
  border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer;transition:all .12s;}
.f-btn.on{background:var(--navy);border-color:var(--navy);color:#fff;}
.proj-list{display:flex;flex-direction:column;gap:6px;flex:1;overflow-y:auto;}
.proj-card{border:1px solid var(--border);border-radius:var(--r12);padding:10px 12px;
  cursor:pointer;background:var(--surface);transition:border-color .12s,box-shadow .12s;}
.proj-card:hover{border-color:var(--border2);box-shadow:var(--sh1);}
.proj-card.sel{border-color:var(--navy);box-shadow:0 0 0 2px rgba(26,39,68,.1);}
.proj-card-name{font-size:13px;font-weight:600;color:var(--text);}
.proj-card-meta{font-size:11.5px;color:var(--muted);margin-top:3px;}
.proj-card-foot{display:flex;gap:5px;align-items:center;margin-top:6px;flex-wrap:wrap;}

/* BADGE */
.badge{display:inline-block;font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px;}
.b-attivo{background:var(--green2);color:var(--green);}
.b-idea{background:#f3f0fd;color:#5b3ec8;}
.b-pausa{background:var(--orange2);color:var(--orange);}
.b-completato{background:var(--blue2);color:var(--blue);}
.b-archiviato{background:#f0f0f0;color:#888;}

/* DETAIL */
.detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:calc(100vh - 120px);color:var(--muted);gap:10px;}
.detail-empty .icon{font-size:40px;opacity:.4;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r16);
  padding:16px;box-shadow:var(--sh1);margin-bottom:12px;}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;
  color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:12px;}
.proj-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;}
.proj-title{font-size:19px;font-weight:700;color:var(--navy);}
.proj-key{font-size:12px;color:var(--muted);margin-top:4px;}
.meta-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.meta-cell{background:var(--bg);border-radius:var(--r8);padding:9px 11px;}
.meta-cell .lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:3px;}
.meta-cell .val{font-size:13px;font-weight:500;}
.notes-box{background:var(--amber2);border:1px solid #f0d090;border-radius:var(--r8);
  padding:11px 13px;font-size:13px;color:var(--mid);white-space:pre-wrap;line-height:1.65;}
.pills{display:flex;flex-wrap:wrap;gap:5px;}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;
  background:var(--blue2);color:var(--blue);font-size:12px;font-weight:500;}

/* PHASES */
.phase-block{border:1px solid var(--border);border-radius:var(--r12);overflow:hidden;margin-bottom:10px;}
.phase-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:9px 13px;background:var(--navy);cursor:pointer;user-select:none;}
.phase-hdr-l{display:flex;align-items:center;gap:8px;}
.phase-name{font-size:13px;font-weight:700;color:#fff;}
.phase-dates{font-size:11px;color:rgba(255,255,255,.55);}
.phase-prog{font-size:11px;color:rgba(255,255,255,.7);}
.phase-hdr-r{display:flex;align-items:center;gap:4px;}
.phase-tog{color:rgba(255,255,255,.6);font-size:11px;margin-right:2px;}
.prog-bar{height:3px;background:rgba(255,255,255,.12);}
.prog-fill{height:100%;background:var(--amber);transition:width .3s;}
.task-list{display:flex;flex-direction:column;}
.task-row{display:flex;align-items:flex-start;gap:8px;padding:8px 13px;
  border-bottom:1px solid var(--border);transition:background .1s;}
.task-row:last-child{border-bottom:none;}
.task-row:hover{background:var(--bg);}
.task-row.done .task-txt{text-decoration:line-through;color:var(--muted);}
.chk{width:17px;height:17px;border-radius:4px;border:2px solid var(--border);background:#fff;
  cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;
  font-size:10px;transition:all .12s;}
.chk.on{background:var(--green);border-color:var(--green);color:#fff;}
.task-body{flex:1;min-width:0;}
.task-txt{font-size:13px;line-height:1.4;}
.task-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:3px;}
.task-owner{font-size:11.5px;color:var(--muted);}
.task-date{font-size:11.5px;color:var(--muted);font-family:'DM Mono',monospace;}
.task-date.ov{color:var(--red);font-weight:600;}
.task-date.soon{color:var(--orange);font-weight:600;}
.task-acts{display:flex;gap:2px;flex-shrink:0;}
.quick-add{display:flex;gap:6px;padding:7px 13px;border-top:1px dashed var(--border);flex-wrap:wrap;}
.quick-add input{border:1px solid var(--border);border-radius:var(--r8);padding:5px 9px;
  font-size:12.5px;font-family:inherit;background:var(--bg);}
.quick-add input:focus{outline:none;border-color:var(--blue);background:#fff;}
.qa-txt{flex:1;min-width:120px;}
.qa-own{width:120px;}
.qa-dt{width:130px;font-family:'DM Mono',monospace;}
.qa-hint{width:100%;font-size:11px;color:var(--muted);padding:0 2px;}

/* FORMS */
input,select,textarea{width:100%;padding:7px 10px;border-radius:var(--r8);
  border:1px solid var(--border);background:var(--bg);font-family:inherit;
  font-size:13px;color:var(--text);transition:border-color .15s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(34,85,196,.1);background:#fff;}
label{display:block;font-size:12px;font-weight:500;color:var(--mid);margin-bottom:10px;}
label input,label select,label textarea{margin-top:4px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.sec-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);border-bottom:1px solid var(--border);padding-bottom:5px;margin:14px 0 10px;}
hr{border:0;border-top:1px solid var(--border);margin:12px 0;}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(10,15,30,.45);display:flex;
  align-items:center;justify-content:center;padding:16px;z-index:1000;backdrop-filter:blur(2px);}
.modal.h{display:none;}
.modal-box{background:var(--surface);border-radius:var(--r16);border:1px solid var(--border);
  width:min(680px,100%);max-height:90vh;overflow-y:auto;box-shadow:var(--sh3);}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:13px 17px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);border-radius:var(--r16) var(--r16) 0 0;z-index:1;}
.modal-hdr strong{font-size:14px;}
.modal-body{padding:17px;}

/* REPORT */
.rep-bar{background:var(--navy);color:#fff;padding:10px 18px;display:flex;
  justify-content:space-between;align-items:center;margin:-28px -36px 22px;}
@media print{.rep-bar,.no-print{display:none!important;} body{padding:0;}}
</style>
</head>
<body>

<header class="bar">
  <div>
    <h1><span>◈</span> Project Vault</h1>
    <div id="ghStatus" class="bar-sub info">GitHub Sync non configurato</div>
  </div>
  <div class="bar-right">
    <a href="index.html" class="btn btn-ghost">◆ Sales Vault</a>
    <button class="btn-amber" id="btnNewProj">+ Nuovo progetto</button>
    <button class="btn-ghost" id="btnSync">☁️ Sync</button>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div>
      <div class="sidebar-title">Progetti</div>
      <input class="search-box" id="searchQ" placeholder="Cerca…"/>
    </div>
    <div class="filter-row">
      <button class="f-btn on" data-f="all">Tutti</button>
      <button class="f-btn" data-f="idea">Idea</button>
      <button class="f-btn" data-f="attivo">Attivi</button>
      <button class="f-btn" data-f="pausa">Pausa</button>
      <button class="f-btn" data-f="completato">Completati</button>
    </div>
    <div class="proj-list" id="projList"></div>
  </aside>
  <main class="main" id="mainPanel">
    <div class="detail-empty">
      <div class="icon">◈</div>
      <p>Seleziona un progetto o creane uno nuovo.</p>
    </div>
  </main>
</div>

<!-- Modal Progetto -->
<div class="modal h" id="mProj">
  <div class="modal-box">
    <div class="modal-hdr">
      <strong id="mProjTitle">Nuovo progetto</strong>
      <button class="btn-sec btn-sm" id="mProjClose">✕ Chiudi</button>
    </div>
    <div class="modal-body">
      <label style="grid-column:span 2;">Nome progetto *<input id="fPName" placeholder="es. Network Docenti UP"/></label>
      <div class="g2">
        <label>Stato<select id="fPStatus">
          <option value="idea">💡 Idea</option>
          <option value="attivo" selected>🟢 Attivo</option>
          <option value="pausa">⏸ In pausa</option>
          <option value="completato">✅ Completato</option>
          <option value="archiviato">📦 Archiviato</option>
        </select></label>
        <label>Responsabile principale<input id="fPOwner" placeholder="es. Renato"/></label>
        <label>Data inizio<input id="fPStart" type="date"/></label>
        <label>Data fine prevista<input id="fPEnd" type="date"/></label>
        <label>Evento / milestone chiave<input id="fPKeyEv" placeholder="es. Evento lancio"/></label>
        <label>Data evento chiave<input id="fPKeyDt" type="date"/></label>
      </div>
      <div class="sec-lbl">Obiettivo / Note</div>
      <textarea id="fPNotes" rows="4" placeholder="Obiettivo, idee, vincoli…" style="margin-bottom:12px;"></textarea>
      <div class="sec-lbl">Partecipanti</div>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <input id="fPPartInp" placeholder="Nome partecipante" style="flex:1;"/>
        <button class="btn-navy btn-sm" id="btnAddPart">+ Aggiungi</button>
      </div>
      <div id="fPParts" class="pills" style="margin-bottom:16px;min-height:28px;"></div>
      <div style="display:flex;gap:8px;">
        <button class="btn-navy" id="mProjSave" style="flex:1;">💾 Salva</button>
        <button class="btn-danger btn-sm" id="mProjDel" style="display:none;">🗑 Elimina</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Fase -->
<div class="modal h" id="mFase">
  <div class="modal-box" style="width:min(440px,100%);">
    <div class="modal-hdr">
      <strong id="mFaseTitle">Nuova fase</strong>
      <button class="btn-sec btn-sm" id="mFaseClose">✕ Chiudi</button>
    </div>
    <div class="modal-body">
      <label>Nome fase *<input id="fFName" placeholder="es. Fase 0 — Preparazione"/></label>
      <div class="g2">
        <label>Data inizio<input id="fFStart" type="date"/></label>
        <label>Data fine<input id="fFEnd" type="date"/></label>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px;">
        <button class="btn-navy" id="mFaseSave" style="flex:1;">💾 Salva</button>
        <button class="btn-danger btn-sm" id="mFaseDel" style="display:none;">🗑 Elimina</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal Attività -->
<div class="modal h" id="mTask">
  <div class="modal-box" style="width:min(480px,100%);">
    <div class="modal-hdr">
      <strong id="mTaskTitle">Nuova attività</strong>
      <button class="btn-sec btn-sm" id="mTaskClose">✕ Chiudi</button>
    </div>
    <div class="modal-body">
      <label>Descrizione *<textarea id="fTTxt" rows="3" placeholder="Cosa deve essere fatto?"></textarea></label>
      <div class="g2">
        <label>Responsabile<input id="fTOwner" placeholder="es. Silvia / Renato"/></label>
        <label>Data scadenza<input id="fTDate" type="date"/></label>
        <label>Settimana / range<input id="fTWeek" placeholder="es. 16–20 giu"/></label>
        <label>Stato<select id="fTDone">
          <option value="0">☐ Da fare</option>
          <option value="1">✓ Completata</option>
        </select></label>
      </div>
      <button class="btn-navy" id="mTaskSave" style="width:100%;margin-top:8px;">💾 Salva</button>
    </div>
  </div>
</div>

<!-- Modal GitHub -->
<div class="modal h" id="mGh">
  <div class="modal-box" style="width:min(480px,100%);">
    <div class="modal-hdr">
      <strong>☁️ GitHub Sync</strong>
      <button class="btn-sec btn-sm" id="mGhClose">✕ Chiudi</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--mid);margin-bottom:14px;">Salva i dati su GitHub come <code>project-vault.json</code>. Usa le stesse credenziali del Sales Vault.</p>
      <label>Token GitHub (PAT)<input id="fGhTok" type="password" placeholder="ghp_…"/></label>
      <label>Owner<input id="fGhOwn" placeholder="es. UP2026-gest"/></label>
      <label>Repository<input id="fGhRepo" placeholder="es. sales-vault-app"/></label>
      <label>Percorso file<input id="fGhPath" value="data/project-vault.json"/></label>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn-navy" id="mGhSave" style="flex:1;">Salva e sincronizza</button>
        <button class="btn-danger btn-sm" id="mGhClear">Rimuovi</button>
      </div>
      <div id="ghMsg" style="margin-top:10px;font-size:13px;"></div>
    </div>
  </div>
</div>

<script>
"use strict";
// ════════════════════════════════════════════════
// UTILITIES
// ════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
const now = () => new Date().toISOString();
const today = () => { const d=new Date(); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; };
const p2 = n => String(n).padStart(2,'0');
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fdt = s => { if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; };
const addDays = (s,n) => { const d=new Date(s); d.setDate(d.getDate()+n); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`; };

// ════════════════════════════════════════════════
// DATABASE — localStorage è la fonte di verità
// ════════════════════════════════════════════════
const DB_KEY = 'pv_db_v1';
const GH_KEY = 'pv_gh_v1';
const SHA_KEY = 'pv_sha_v1';

let db = { projects: [] };
let _selId = null; // ID progetto selezionato — MAI resettato dal sync
let _filter = 'all';
let _search = '';
let _editProjId = null;
let _editFaseId = null;
let _editTaskFid = null;
let _editTaskId = null;
let _tempParts = [];
let _ghPushing = false;

function dbLoad() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p && Array.isArray(p.projects)) db = p;
  } catch(e) { console.warn('dbLoad error', e); }
}

function dbSave() {
  db.updatedAt = now();
  localStorage.setItem(DB_KEY, JSON.stringify(db));
  ghPushBackground(); // push in background, non blocca UI
}

// ════════════════════════════════════════════════
// GITHUB — push/pull non toccano mai _selId o la UI direttamente
// ════════════════════════════════════════════════
function ghCfg() {
  try { return JSON.parse(localStorage.getItem(GH_KEY) || 'null'); } catch { return null; }
}
function ghOk() { const c=ghCfg(); return !!(c?.tok && c?.own && c?.repo && c?.path); }
function ghUrl() { const c=ghCfg(); return `https://api.github.com/repos/${c.own}/${c.repo}/contents/${c.path}`; }
function ghHdr() { const c=ghCfg(); return { 'Authorization':`Bearer ${c.tok}`, 'Accept':'application/vnd.github+json', 'X-GitHub-Api-Version':'2022-11-28' }; }
function ghSha(s) { if(s!==undefined) localStorage.setItem(SHA_KEY,s); return localStorage.getItem(SHA_KEY); }

function setStatus(msg, cls) {
  $('ghStatus').textContent = msg;
  $('ghStatus').className = 'bar-sub ' + cls;
}

// Push in background: non tocca la UI, non tocca _selId
async function ghPushBackground() {
  if (!ghOk() || _ghPushing) return;
  _ghPushing = true;
  try {
    const body = {
      message: 'Project Vault sync',
      content: btoa(unescape(encodeURIComponent(JSON.stringify(db, null, 2)))),
    };
    const sha = ghSha();
    if (sha) body.sha = sha;
    const r = await fetch(ghUrl(), { method:'PUT', headers:ghHdr(), body:JSON.stringify(body) });
    if (r.ok) {
      const j = await r.json();
      ghSha(j.content?.sha);
      setStatus(`✓ Sincronizzato — ${new Date().toLocaleString('it-IT')}`, 'ok');
    } else if (r.status === 409) {
      // Conflitto SHA: rileggo il SHA e riprovo una volta
      const rGet = await fetch(ghUrl(), { headers:ghHdr() });
      if (rGet.ok) {
        const jGet = await rGet.json();
        ghSha(jGet.sha);
        body.sha = jGet.sha;
        const r2 = await fetch(ghUrl(), { method:'PUT', headers:ghHdr(), body:JSON.stringify(body) });
        if (r2.ok) { const j2=await r2.json(); ghSha(j2.content?.sha); setStatus(`✓ Sincronizzato — ${new Date().toLocaleString('it-IT')}`, 'ok'); }
        else setStatus('⚠️ Errore salvataggio GitHub', 'err');
      }
    } else {
      setStatus('⚠️ Errore salvataggio GitHub', 'err');
    }
  } catch(e) { setStatus('⚠️ Errore connessione', 'err'); }
  finally { _ghPushing = false; }
}

// Pull manuale (solo su richiesta esplicita o primo avvio)
async function ghPull() {
  if (!ghOk()) return;
  setStatus('🔄 Sincronizzazione…', 'sync');
  try {
    const r = await fetch(ghUrl(), { headers:ghHdr() });
    if (r.status === 404) { setStatus('✓ Pronto (file remoto vuoto)', 'ok'); return; }
    if (!r.ok) { setStatus('⚠️ Errore lettura GitHub', 'err'); return; }
    const j = await r.json();
    ghSha(j.sha);
    const remote = JSON.parse(atob(j.content.replace(/\n/g,'')));
    // Merge per ID: vince la versione con updatedAt più recente
    if (Array.isArray(remote.projects)) {
      const byId = new Map(db.projects.filter(p=>p?.id).map(p=>[p.id,p]));
      for (const rp of remote.projects) {
        if (!rp?.id) continue;
        const lp = byId.get(rp.id);
        if (!lp || (rp.updatedAt||'') > (lp.updatedAt||'')) byId.set(rp.id, rp);
      }
      db.projects = [...byId.values()];
      localStorage.setItem(DB_KEY, JSON.stringify(db));
    }
    setStatus(`✓ Sincronizzato — ${new Date().toLocaleString('it-IT')}`, 'ok');
    // Aggiorna solo la lista sidebar, NON tocca _selId
    renderList();
    // Se c'è un progetto selezionato, aggiorna anche il dettaglio (i dati potrebbero essere cambiati)
    if (_selId) renderDetail();
  } catch(e) { setStatus('⚠️ Errore sync', 'err'); console.warn(e); }
}

const STATUS_LBL = { idea:'💡 Idea', attivo:'🟢 Attivo', pausa:'⏸ In pausa', completato:'✅ Completato', archiviato:'📦 Archiviato' };
const STATUS_ORD = ['attivo','idea','pausa','completato','archiviato'];

function renderList() {
  let list = db.projects.filter(p => p?.id && p?.name);
  if (_filter !== 'all') list = list.filter(p => p.status === _filter);
  if (_search) list = list.filter(p =>
    (p.name||'').toLowerCase().includes(_search) ||
    (p.owner||'').toLowerCase().includes(_search) ||
    (p.notes||'').toLowerCase().includes(_search)
  );
  list.sort((a,b) => STATUS_ORD.indexOf(a.status) - STATUS_ORD.indexOf(b.status));

  const el = $('projList');
  if (!list.length) {
    el.innerHTML = '<p style="font-size:13px;color:var(--muted);text-align:center;padding:20px;">Nessun progetto.</p>';
    return;
  }
  el.innerHTML = list.map(p => {
    const tasks = (p.phases||[]).flatMap(f=>f.tasks||[]);
    const done = tasks.filter(t=>t.done).length;
    const tot = tasks.length;
    const sel = p.id === _selId ? ' sel' : '';
    const keyDt = p.keyEventDate ? ` · 🎯 ${fdt(p.keyEventDate)}` : '';
    return `<div class="proj-card${sel}" data-id="${p.id}">
      <div class="proj-card-name">${esc(p.name)}</div>
      <div class="proj-card-meta">${esc(p.owner||'')}${keyDt}</div>
      <div class="proj-card-foot">
        <span class="badge b-${p.status}">${STATUS_LBL[p.status]||p.status}</span>
        ${tot>0?`<span style="font-size:11px;color:var(--muted);">${done}/${tot} (${Math.round(done/tot*100)}%)</span>`:''}
      </div>
    </div>`;
  }).join('');

  el.querySelectorAll('.proj-card').forEach(c => {
    c.addEventListener('click', () => {
      _selId = c.dataset.id;
      renderList();   // aggiorna selezione visiva
      renderDetail(); // mostra dettaglio
    });
  });
}

function renderPhaseHtml(f, td) {
  const tasks = f.tasks||[];

  const pct = tot>0?Math.round(done/tot*100):0;
  const dates = [f.startDate?fdt(f.startDate):'',f.endDate?fdt(f.endDate):''].filter(Boolean).join(' – ');

  const taskRows = tasks.map(t => {
    const ov = !t.done&&t.date&&t.date<td;
    const sn = !t.done&&t.date&&t.date>=td&&t.date<=addDays(td,7);
    const dl = t.date?fdt(t.date):(t.week||'');
    const dc = ov?'ov':sn?'soon':'';
    return `<div class="task-row${t.done?' done':''}">
      <div class="chk${t.done?' on':''}" data-fid="${f.id}" data-tid="${t.id}">${t.done?'✓':''}</div>

          ${dl?`<span class="task-date ${dc}">📅 ${esc(dl)}</span>`:''}
        </div>
      </div>
      <div class="task-acts">
        <button class="btn-icon btn-et" data-fid="${f.id}" data-tid="${t.id}" title="Modifica">✏️</button>
        <button class="btn-icon btn-dt" data-fid="${f.id}" data-tid="${t.id}" title="Elimina">🗑</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="phase-block">
    <div class="phase-hdr" data-fid="${f.id}">
      <div class="phase-hdr-l">
        <span class="phase-tog">${f.collapsed?'▶':'▼'}</span>
        <span class="phase-name">${esc(f.name||'(fase)')}</span>
        ${dates?`<span class="phase-dates">${esc(dates)}</span>`:''}
      </div>
      <div class="phase-hdr-r">
        ${tot>0?`<span class="phase-prog">${done}/${tot} (${pct}%)</span>`:''}
        <button class="btn-icon btn-ef" data-fid="${f.id}" style="color:rgba(255,255,255,.65);" title="Modifica fase">✏️</button>
        <button class="btn-icon btn-af" data-fid="${f.id}" style="color:rgba(255,255,255,.65);font-size:18px;" title="Aggiungi attività">+</button>
      </div>
    </div>
    ${tot>0?`<div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>`:''}
    ${!f.collapsed?`<div>
      <div class="task-list">${taskRows}</div>

        <span class="qa-hint">Invio nel campo testo oppure clicca + Aggiungi</span>
      </div>
    </div>`:''}
  </div>`;
}

function doQuickAdd(fid) {
  const txtEl = document.querySelector(`.qa-txt[data-fid="${fid}"]`);

  if (p) p.updatedAt = now();

  renderDetail();
}

  const p = getProj(id); if (!p) return;
  const win = window.open('','_blank');
  win.document.write(buildReport(p));
  win.document.close();
}

function buildReport(p) {
  const td = today();
  const e = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fd = s => { if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; };
  const allTasks = (p.phases||[]).flatMap(f=>(f.tasks||[]).map(t=>({...t,fn:f.name})));
  const done=allTasks.filter(t=>t.done).length, tot=allTasks.length;
  const over=allTasks.filter(t=>!t.done&&t.date&&t.date<td);
  const soon=allTasks.filter(t=>!t.done&&t.date&&t.date>=td&&t.date<=addDays(td,7));

  const phasesHtml = (p.phases||[]).map(f=>{
    const ft=f.tasks||[]; const fd2=ft.filter(t=>t.done).length;
    const fp=ft.length>0?Math.round(fd2/ft.length*100):0;
    const dates=[f.startDate?fd(f.startDate):'',f.endDate?fd(f.endDate):''].filter(Boolean).join(' – ');
    const rows=ft.map(t=>{
      const ov=!t.done&&t.date&&t.date<td;
      const sn=!t.done&&t.date&&t.date>=td&&t.date<=addDays(td,7);
      const dl=t.date?fd(t.date):(t.week||'—');
      let badge='';
      if(ov) badge='<span style="background:#fdf0f0;color:#b52a2a;font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;">⚠ scaduta</span>';
      else if(sn) badge='<span style="background:#fff4ec;color:#c75a00;font-size:10px;font-weight:700;border-radius:4px;padding:1px 5px;">🔔 in scadenza</span>';
      return `<tr style="${t.done?'color:#aaa;text-decoration:line-through;':''}">
        <td style="width:20px;">${t.done?'✓':'☐'}</td>
        <td>${e(t.text)}</td>
        <td>${e(t.owner||'—')}</td>
        <td style="font-family:monospace;">${e(dl)} ${badge}</td>
      </tr>`;
    }).join('');
    return `<div style="border:1px solid #dde2ec;border-radius:8px;overflow:hidden;margin-bottom:12px;page-break-inside:avoid;">
      <div style="background:#1a2744;color:#fff;padding:8px 12px;font-size:12px;font-weight:700;">
        ${e(f.name||'(fase)')}${dates?`<span style="font-weight:400;opacity:.6;margin-left:8px;">${e(dates)}</span>`:''}
        <span style="float:right;font-weight:400;opacity:.7;">${fd2}/${ft.length} (${fp}%)</span>
      </div>
      ${ft.length>0?`<div style="height:3px;background:#e8a020;width:${fp}%;"></div>`:''}
      ${ft.length>0?`<table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr style="background:#f2f4f8;">
          <th style="padding:5px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#7a85a0;"></th>
          <th style="padding:5px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#7a85a0;">Attività</th>
          <th style="padding:5px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#7a85a0;">Responsabile</th>
          <th style="padding:5px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#7a85a0;">Scadenza</th>
        </tr></thead><tbody>${rows}</tbody></table>`
      :`<p style="padding:10px 12px;color:#aaa;font-size:12px;">Nessuna attività.</p>`}
    </div>`;
  }).join('');

  return `<!doctype html><html lang="it"><head><meta charset="utf-8"/>
    <title>Report: ${e(p.name)}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>*{box-sizing:border-box;}body{font-family:'DM Sans',sans-serif;font-size:13px;color:#1a2133;background:#fff;padding:28px 36px;}
    h1{font-size:21px;font-weight:700;color:#1a2744;margin-bottom:3px;}
    .sub{color:#7a85a0;font-size:12px;margin-bottom:20px;}
    .sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#7a85a0;border-bottom:1px solid #dde2ec;padding-bottom:5px;margin:18px 0 10px;}
    .kg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}
    .kc{background:#f2f4f8;border-radius:8px;padding:10px 12px;}
    .kv{font-size:18px;font-weight:700;color:#1a2744;}.kl{font-size:10px;color:#7a85a0;margin-top:2px;}
    .kv.g{color:#1a7a3a;}.kv.r{color:#b52a2a;}.kv.a{color:#c75a00;}
    .mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
    .mc{background:#f2f4f8;border-radius:8px;padding:9px 11px;}
    .ml{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#7a85a0;margin-bottom:3px;}
    .mv{font-size:13px;font-weight:500;}
    .notes{background:#fdf3e0;border:1px solid #f0d090;border-radius:8px;padding:11px 13px;font-size:13px;color:#4a5570;white-space:pre-wrap;line-height:1.6;}
    .pill{display:inline-block;padding:2px 9px;border-radius:20px;background:#eef3fd;color:#2255c4;font-size:11px;font-weight:500;margin:2px;}
    @media print{.no-print{display:none!important;}}
    </style></head><body>
    <div class="no-print" style="background:#1a2744;color:#fff;padding:10px 18px;margin:-28px -36px 22px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-weight:600;">📄 Report — ${e(p.name)}</span>
      <button onclick="window.print()" style="background:#e8a020;color:#1a2744;border:none;border-radius:8px;padding:7px 16px;font-weight:700;cursor:pointer;">🖨 Stampa</button>
    </div>
    <h1>${e(p.name)}</h1>
    <div class="sub">Generato il ${fd(td)} · ${STATUS_LBL[p.status]||p.status}</div>
    <div class="kg">
      <div class="kc"><div class="kv">${tot}</div><div class="kl">Attività totali</div></div>
      <div class="kc"><div class="kv g">${done}</div><div class="kl">Completate (${tot>0?Math.round(done/tot*100):0}%)</div></div>
      <div class="kc"><div class="kv r">${over.length}</div><div class="kl">Scadute</div></div>
      <div class="kc"><div class="kv a">${soon.length}</div><div class="kl">In scadenza (7gg)</div></div>
    </div>
    <div class="mg">
      <div class="mc"><div class="ml">Responsabile</div><div class="mv">${e(p.owner||'—')}</div></div>
      <div class="mc"><div class="ml">Periodo</div><div class="mv">${p.startDate?fd(p.startDate):'—'}${p.endDate?' → '+fd(p.endDate):''}</div></div>
      <div class="mc"><div class="ml">Evento chiave</div><div class="mv">${e(p.keyEvent||'—')}${p.keyEventDate?' · '+fd(p.keyEventDate):''}</div></div>
    </div>
    ${(p.participants||[]).length?`<div class="sec">Partecipanti</div><div>${(p.participants).map(n=>`<span class="pill">${e(n)}</span>`).join('')}</div>`:''}
    ${p.notes?`<div class="sec">Obiettivo / Note</div><div class="notes">${e(p.notes)}</div>`:''}
    ${over.length?`<div class="sec" style="color:#b52a2a;">⚠ Attività scadute (${over.length})</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px;">
        <thead><tr style="background:#f2f4f8;"><th style="padding:5px 8px;text-align:left;">Attività</th><th style="padding:5px 8px;text-align:left;">Fase</th><th style="padding:5px 8px;text-align:left;">Responsabile</th><th style="padding:5px 8px;text-align:left;">Scadenza</th></tr></thead>
        <tbody>${over.map(t=>`<tr><td style="padding:5px 8px;">${e(t.text)}</td><td style="padding:5px 8px;">${e(t.fn||'')}</td><td style="padding:5px 8px;">${e(t.owner||'—')}</td><td style="padding:5px 8px;color:#b52a2a;font-weight:600;">${fd(t.date)}</td></tr>`).join('')}</tbody>
      </table>`:''}
    <div class="sec">Fasi e attività</div>
    ${phasesHtml||'<p style="color:#aaa;">Nessuna fase.</p>'}
  </body></html>`;
}

// ════════════════════════════════════════════════
// FILTRI E RICERCA
// ════════════════════════════════════════════════
$('btnNewProj').onclick = () => openProjModal(null);
$('searchQ').oninput = e => { _search = e.target.value.toLowerCase().trim(); renderList(); };
document.querySelectorAll('.f-btn').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('.f-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    _filter = b.dataset.f;
    renderList();
  };
});

// Chiudi modal cliccando fuori
['mProj','mFase','mTask','mGh'].forEach(id => {
  $(id).addEventListener('click', e => { if(e.target===e.currentTarget) $(id).classList.add('h'); });
});

// ════════════════════════════════════════════════
// AVVIO
// ════════════════════════════════════════════════
dbLoad();
renderList();
renderDetail();

if (ghOk()) {
  setStatus('🔄 Connessione…', 'sync');
  ghPull();
} else {
  setStatus('GitHub Sync non configurato — clicca ☁️ Sync', 'info');
}
</script>
</body>
</html>
